<script>
document.addEventListener("DOMContentLoaded", () => {

const name = localStorage.getItem("name") || "User";
let room = prompt("Enter room:", "general") || "general";

document.getElementById("chat-room").innerText = "Room: " + room;

const socket = io("https://chatzoom.onrender.com", {
  transports: ["websocket", "polling"]
});

const input = document.getElementById("ip");
const messagesDiv = document.getElementById("messages");
const typingDiv = document.getElementById("typing");

// Join room
socket.on("connect", () => {
  socket.emit("joinRoom", { username: name, room });
});

// Send text
window.sendMessage = function () {
  const msg = input.value.trim();

  if (msg) {
    socket.emit("gyan", msg);
    input.value = "";
    socket.emit("stopTyping");
  }
};

// Receive text
socket.on("chatMessage", (msg) => {
  appendMessage(msg.username, msg.content, msg.timestamp);
});

// Upload image
window.sendImage = async function () {
  const fileInput = document.getElementById("imageInput");
  const file = fileInput.files[0];

  if (!file) {
    alert("Select image first");
    return;
  }

  const formData = new FormData();
  formData.append("image", file);

  try {
    const res = await fetch("https://chatzoom.onrender.com/uploads", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    socket.emit("sendImage", data.imageUrl);
    fileInput.value = "";

  } catch (err) {
    alert("Image upload failed");
  }
};

// Receive image
socket.on("receiveImage", (data) => {
  appendImage(data.username, data.imageUrl, data.timestamp);
});

// UI
function appendMessage(sender, content, timestamp) {
  const bubble = document.createElement("div");
  const isMine = sender === name;
  const time = new Date(timestamp).toLocaleTimeString([], {
    hour: "2-digit",
    minute: "2-digit"
  });

  bubble.className = `max-w-[70%] px-4 py-2 rounded-lg ${
    isMine ? "bg-green-200 ml-auto" : "bg-gray-200"
  }`;

  bubble.innerHTML = `
    <strong>${sender}</strong><br>
    ${content}
    <div class="text-[10px] text-right">${time}</div>
  `;

  messagesDiv.appendChild(bubble);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function appendImage(sender, imageUrl, timestamp) {
  const bubble = document.createElement("div");
  const isMine = sender === name;
  const time = new Date(timestamp).toLocaleTimeString([], {
    hour: "2-digit",
    minute: "2-digit"
  });

  bubble.className = `max-w-[70%] px-3 py-2 rounded-lg ${
    isMine ? "bg-green-200 ml-auto" : "bg-gray-200"
  }`;

  bubble.innerHTML = `
    <strong>${sender}</strong><br>
    <img src="${imageUrl}" class="mt-2 rounded-lg max-w-[200px] cursor-pointer"
    onclick="window.open('${imageUrl}')"/>
    <div class="text-[10px] text-right">${time}</div>
  `;

  messagesDiv.appendChild(bubble);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// Typing
let typingTimeout;

window.handleTyping = function () {
  socket.emit("typing");

  clearTimeout(typingTimeout);

  typingTimeout = setTimeout(() => {
    socket.emit("stopTyping");
  }, 1500);
};

socket.on("typing", (msg) => {
  typingDiv.innerText = msg;
});

socket.on("stopTyping", () => {
  typingDiv.innerText = "";
});

// Logout
window.logout = function () {
  localStorage.clear();
  window.location.href = "./login.html";
};

// Enter key
input.addEventListener("keypress", function (e) {
  if (e.key === "Enter") {
    sendMessage();
  }
});

});
</script>
