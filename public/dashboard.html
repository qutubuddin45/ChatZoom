<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatZoom | Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
</head>

<body class="bg-gray-100">

  <div class="w-screen h-screen bg-white flex flex-col sm:max-w-md sm:h-[90vh] sm:rounded-lg sm:shadow-lg mx-auto">

    <!-- Header -->
    <div class="bg-green-600 text-white text-sm sm:text-lg font-semibold px-4 py-3 flex justify-between items-center">
      <span id="chat-room">Room: general</span>

      <button onclick="logout()" class="bg-red-500 px-3 py-1 rounded">
        Logout
      </button>
    </div>

    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50 text-sm"></div>

    <!-- Typing -->
    <div id="typing" class="text-xs text-gray-500 px-4 py-1 h-5"></div>

    <!-- Input Area -->
    <div class="p-3 border-t flex flex-col gap-2">

      <!-- Message Row -->
      <div class="flex flex-col sm:flex-row gap-2">
        <input
          id="ip"
          type="text"
          placeholder="Type message..."
          class="flex-1 border rounded-full px-4 py-2"
          oninput="handleTyping()"
        />

        <button
          onclick="sendMessage()"
          class="bg-green-600 text-white px-4 py-2 rounded-full w-full sm:w-auto"
        >
          Send
        </button>
      </div>

      <!-- Upload Row -->
      <div class="flex flex-col sm:flex-row gap-2 items-stretch sm:items-center">
        <input type="file" id="imageInput" class="text-xs w-full" />

        <button
          onclick="sendImage()"
          class="bg-blue-500 text-white px-3 py-2 rounded w-full sm:w-auto"
        >
          Upload
        </button>
      </div>

    </div>
  </div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const name = localStorage.getItem("name") || "User";
  let room = prompt("Enter room:", "general") || "general";

  const chatRoom = document.getElementById("chat-room");
  const input = document.getElementById("ip");
  const messagesDiv = document.getElementById("messages");
  const typingDiv = document.getElementById("typing");

  if (!chatRoom || !input || !messagesDiv || !typingDiv) {
    console.error("Dashboard elements missing");
    return;
  }

  chatRoom.innerText = "Room: " + room;

  const socket = io("https://chatzoom.onrender.com", {
    transports: ["websocket", "polling"]
  });

  socket.on("connect", () => {
    socket.emit("joinRoom", { username: name, room });
  });

  window.sendMessage = function () {
    const msg = input.value.trim();

    if (msg) {
      socket.emit("gyan", msg);
      input.value = "";
      socket.emit("stopTyping");
    }
  };

  socket.on("chatMessage", (msg) => {
    appendMessage(msg.username, msg.content);
  });

  window.sendImage = async function () {
    const fileInput = document.getElementById("imageInput");
    const file = fileInput.files[0];

    if (!file) {
      alert("Select image first");
      return;
    }

    const formData = new FormData();
    formData.append("image", file);

    try {
      const res = await fetch("https://chatzoom.onrender.com/uploads", {
        method: "POST",
        body: formData
      });

      const data = await res.json();

      socket.emit("sendImage", data.imageUrl);
      fileInput.value = "";

    } catch (err) {
      alert("Image upload failed");
    }
  };

  socket.on("receiveImage", (data) => {
    appendImage(data.username, data.imageUrl);
  });

  function appendMessage(sender, content) {
    const bubble = document.createElement("div");
    const isMine = sender === name;

    bubble.className = `max-w-[75%] px-4 py-2 rounded-lg ${
      isMine ? "bg-green-200 ml-auto" : "bg-gray-200"
    }`;

    bubble.innerHTML = `<strong>${sender}</strong><br>${content}`;

    messagesDiv.appendChild(bubble);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function appendImage(sender, imageUrl) {
    const bubble = document.createElement("div");
    const isMine = sender === name;

    bubble.className = `max-w-[75%] px-3 py-2 rounded-lg ${
      isMine ? "bg-green-200 ml-auto" : "bg-gray-200"
    }`;

    bubble.innerHTML = `
      <strong>${sender}</strong><br>
      <img src="${imageUrl}" class="mt-2 rounded-lg max-w-full cursor-pointer"
      onclick="window.open('${imageUrl}')"/>
    `;

    messagesDiv.appendChild(bubble);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  let typingTimeout;

  window.handleTyping = function () {
    socket.emit("typing");

    clearTimeout(typingTimeout);

    typingTimeout = setTimeout(() => {
      socket.emit("stopTyping");
    }, 1500);
  };

  socket.on("typing", (msg) => {
    typingDiv.innerText = msg;
  });

  socket.on("stopTyping", () => {
    typingDiv.innerText = "";
  });

  window.logout = function () {
    localStorage.clear();
    window.location.href = "./login.html";
  };

  input.addEventListener("keypress", function (e) {
    if (e.key === "Enter") {
      sendMessage();
    }
  });

});
</script>

</body>
</html>
