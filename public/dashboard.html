<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>ChatZoom | Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
</head>

<body class="bg-gray-100 h-screen flex justify-center items-center">

  <div class="w-full max-w-md h-[90vh] bg-white shadow-lg rounded-lg flex flex-col">

    <!-- Header -->
    <div class="bg-green-600 text-white text-lg font-semibold px-4 py-3 flex justify-between">
      <span id="chat-room">Room: general</span>
      <button onclick="logout()" class="bg-red-500 px-2 py-1 rounded">Logout</button>
    </div>

    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50 text-sm"></div>

    <!-- Typing -->
    <div id="typing" class="text-xs text-gray-500 px-4 py-1 h-5"></div>

    <!-- INPUT AREA (FIXED UI) -->
    <div class="p-3 border-t flex flex-col gap-2">

      <!-- TEXT ROW -->
      <div class="flex gap-2">
        <input id="ip" type="text" placeholder="Type message..."
          class="flex-1 border rounded-full px-4 py-2"
          oninput="handleTyping()" />

        <button onclick="sendMessage()"
          class="bg-green-600 text-white px-4 py-2 rounded-full">
          Send
        </button>
      </div>

      <!-- IMAGE ROW -->
      <div class="flex gap-2 items-center">
        <input type="file" id="imageInput" class="text-xs w-full" />

        <button onclick="sendImage()"
          class="bg-blue-500 text-white px-3 py-2 rounded">
          Upload
        </button>
      </div>

    </div>

  </div>

<script>

const name = localStorage.getItem("name") || "User";
let room = prompt("Enter room:", "general") || "general";
document.getElementById("chat-room").innerText = "Room: " + room;

const socket = io("https://chatzoom.onrender.com");

const input = document.getElementById("ip");
const messagesDiv = document.getElementById("messages");
const typingDiv = document.getElementById("typing");

// join room
socket.on("connect", () => {
  socket.emit("joinRoom", { username: name, room });
});

// ================= TEXT MESSAGE =================
function sendMessage() {
  const msg = input.value.trim();
  if (msg) {
    socket.emit("gyan", msg);
    input.value = "";
    socket.emit("stopTyping");
  }
}

// show text
socket.on("chatMessage", (msg) => {
  appendMessage(msg.username, msg.content, msg.timestamp);
});

// ================= IMAGE SEND (FIXED) =================
async function sendImage() {
  const fileInput = document.getElementById("imageInput");
  const file = fileInput.files[0];

  if (!file) {
    alert("Select image first");
    return;
  }

  const formData = new FormData();
  formData.append("image", file);

  try {
    const res = await fetch("https://chatzoom.onrender.com/uploads", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    console.log("Uploaded:", data);

    socket.emit("sendImage", data.imageUrl);

    fileInput.value = ""; // reset

  } catch (err) {
    console.error("Upload error:", err);
    alert("Image upload failed");
  }
}

// ================= IMAGE RECEIVE =================
socket.on("receiveImage", (data) => {
  appendImage(data.username, data.imageUrl, data.timestamp);
});

// ================= UI FUNCTIONS =================
function appendMessage(sender, content, timestamp) {
  const bubble = document.createElement("div");
  const isMine = sender === name;
  const time = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  bubble.className = `max-w-[70%] px-4 py-2 rounded-lg ${
    isMine ? "bg-green-200 ml-auto" : "bg-gray-200"
  }`;

  bubble.innerHTML = `<strong>${sender}</strong><br>${content}
    <div class="text-[10px] text-right">${time}</div>`;

  messagesDiv.appendChild(bubble);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function appendImage(sender, imageUrl, timestamp) {
  const bubble = document.createElement("div");
  const isMine = sender === name;
  const time = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  bubble.className = `max-w-[70%] px-3 py-2 rounded-lg ${
    isMine ? "bg-green-200 ml-auto" : "bg-gray-200"
  }`;

  bubble.innerHTML = `
    <strong>${sender}</strong><br>
    <img src="${imageUrl}" class="mt-2 rounded-lg max-w-[200px] cursor-pointer"
    onclick="window.open('${imageUrl}')"/>
    <div class="text-[10px] text-right">${time}</div>
  `;

  messagesDiv.appendChild(bubble);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// ================= TYPING =================
let typingTimeout;
function handleTyping() {
  socket.emit("typing");
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => socket.emit("stopTyping"), 1500);
}

socket.on("typing", (msg) => typingDiv.innerText = msg);
socket.on("stopTyping", () => typingDiv.innerText = "");

// ================= LOGOUT =================
function logout() {
  localStorage.clear();
  window.location.href = "/login.html";
}

// ENTER key
input.addEventListener("keypress", function (e) {
  if (e.key === "Enter") {
    sendMessage();
  }
});

</script>

</body>
</html>
